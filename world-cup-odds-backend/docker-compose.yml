version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: odds_db
    environment:
      POSTGRES_USER: odds_user
      POSTGRES_PASSWORD: odds_password
      POSTGRES_DB: odds_database
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data:
